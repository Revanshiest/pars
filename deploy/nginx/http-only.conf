# resolver 127.0.0.11 — встроенный DNS Docker; без него nginx падает при старте,
# если api/frontend ещё не резолвятся (host not found in upstream).

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 100m;

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # FastAPI: маршруты уже с префиксом /api/v1 — rewrite не нужен (в отличие от omstu)
    location /api/ {
        set $nickel_api api:8000;
        proxy_pass http://$nickel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location ~ ^/(health|live|ready|metrics|admin) {
        set $nickel_api api:8000;
        proxy_pass http://$nickel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $nickel_ui frontend:80;
        proxy_pass http://$nickel_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
