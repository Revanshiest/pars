# Nickel full stack. Run from repo root:
#   docker compose -f deploy/docker-compose.yml up -d --build

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: nickel-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/nickel_kg_pass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: nickel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/api/Dockerfile
    container_name: nickel-api
    ports:
      - "8000:8000"
    expose:
      - "8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: nickel_kg_pass
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:120b-cloud}
      AGENT_USE_LLM: ${AGENT_USE_LLM:-false}
      UPLOAD_DIR: /app/data/uploads
      OUTPUT_DIR: /app/data/outputs
      INGEST_ROOTS: /app/data/inbox,/app/data/uploads
      JWT_SECRET: ${JWT_SECRET:-change-me-to-random-32-char-secret-key!!}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      API_KEY_TTL_DAYS: ${API_KEY_TTL_DAYS:-90}
      ENABLE_HSTS: ${ENABLE_HSTS:-true}
      TRUST_SSO_HEADERS: ${TRUST_SSO_HEADERS:-false}
    volumes:
      - api_data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: nickel-frontend
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nickel-nginx
    ports:
      - "8443:443"
      - "8080:8080"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  api_data:
