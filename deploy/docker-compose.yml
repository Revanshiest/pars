# Nickel full stack. Run from repo root (один проект — одна сеть):
#   docker compose -f deploy/docker-compose.yml --env-file .env -p pars up -d --build
#
# Не запускайте из папки deploy/ без -p pars — иначе появится второй стек (deploy_default)
# и nginx получит 502 (frontend/api на другой сети).
#
# Первый выпуск сертификата (DOMAIN/EMAIL в .env):
#   docker compose --profile init-cert run --rm certbot-issue
#   docker compose restart nginx
#
# После renew certbot перезагрузите nginx:
#   docker compose exec nginx nginx -s reload

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: nickel-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/nickel_kg_pass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: nickel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bash -c ''exec 3<>/dev/tcp/127.0.0.1/6333 && printf "GET /healthz HTTP/1.0\r\n\r\n" >&3 && head -1 <&3 | grep -q "200 OK" || exit 1''',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: ..
      dockerfile: deploy/api/Dockerfile
    container_name: nickel-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    expose:
      - "8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: nickel_kg_pass
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:120b-cloud}
      AGENT_USE_LLM: ${AGENT_USE_LLM:-false}
      EXTRACTOR_BACKEND: ${EXTRACTOR_BACKEND:-yandex}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      AUTH_ADMIN: ${AUTH_ADMIN}
      PLATFORM_DB: /app/data/platform.db
      GLOSSARY_USE_BGE: ${GLOSSARY_USE_BGE:-true}
      STRICT_SHACL: ${STRICT_SHACL:-true}
      UPLOAD_DIR: /app/data/uploads
      OUTPUT_DIR: /app/data/outputs
      INGEST_ROOTS: /app/data/inbox,/app/data/uploads
      JWT_SECRET: ${JWT_SECRET:-change-me-to-random-32-char-secret-key!!}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      API_KEY_TTL_DAYS: ${API_KEY_TTL_DAYS:-90}
      ENABLE_HSTS: ${ENABLE_HSTS:-true}
      TRUST_SSO_HEADERS: ${TRUST_SSO_HEADERS:-false}
    volumes:
      - api_data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: nickel-frontend
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nickel-nginx
    restart: unless-stopped
    ports:
      - "${NICKEL_HTTP_PORT:-80}:80"
      - "${NICKEL_HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  certbot:
    image: certbot/certbot:latest
    container_name: nickel-certbot
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while true; do
          certbot renew --webroot -w /var/www/certbot --quiet || true
          sleep 43200 &
          wait $$!
        done

  certbot-issue:
    image: certbot/certbot:latest
    profiles:
      - init-cert
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      EMAIL: ${EMAIL:?set EMAIL in .env}
      CERTBOT_STAGING: ${CERTBOT_STAGING:-0}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        if [ -z "$DOMAIN" ] || [ -z "$EMAIL" ]; then
          echo "Set DOMAIN and EMAIL in .env" >&2
          exit 1
        fi
        STAGING=""
        if [ "$CERTBOT_STAGING" = "1" ] || [ "$CERTBOT_STAGING" = "true" ]; then
          STAGING="--staging"
        fi
        exec certbot certonly --webroot -w /var/www/certbot \
          -d "$DOMAIN" --email "$EMAIL" \
          --agree-tos --no-eff-email --non-interactive $$STAGING

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  api_data:
  certbot_www:
  certbot_conf:
