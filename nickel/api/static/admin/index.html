<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nickel KG — Управление пользователями</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --danger: #ef4444;
      --ok: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { font-size: 1.5rem; margin: 0 0 8px; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      margin-bottom: 12px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 10px; font-size: 0.8rem; margin-right: 6px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #243044;
      font-size: 0.75rem;
    }
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .alert-info { background: #1e3a5f; border: 1px solid #2563eb; }
    .alert-ok { background: #14532d; border: 1px solid var(--ok); }
    .alert-err { background: #450a0a; border: 1px solid var(--danger); }
    .key-box {
      font-family: ui-monospace, monospace;
      word-break: break-all;
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px dashed var(--ok);
      margin-top: 8px;
    }
    .hidden { display: none; }
    .actions { white-space: nowrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Управление пользователями</h1>
    <p class="sub">Администратор задаётся в <code>AUTH_ADMIN</code> (.env). Остальных пользователей создавайте здесь.</p>
    <div id="message"></div>

    <div id="login-panel" class="card hidden">
      <h2>Вход</h2>
      <label>API-ключ администратора</label>
      <input id="login-key" type="password" placeholder="X-API-Key">
      <button class="btn-primary" onclick="login()">Войти</button>
    </div>

    <div id="admin-panel" class="hidden">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <strong id="current-user"></strong>
          <button class="btn-secondary btn-sm" onclick="logout()">Выйти</button>
        </div>
      </div>

      <div class="card">
        <h2 style="margin-top:0">Новый пользователь</h2>
        <div class="row">
          <div>
            <label>Email</label>
            <input id="new-email" type="email">
          </div>
          <div>
            <label>Имя</label>
            <input id="new-name" type="text">
          </div>
        </div>
        <div class="row">
          <div>
            <label>Роль</label>
            <select id="new-role"></select>
          </div>
          <div>
            <label>API-ключ (необязательно)</label>
            <input id="new-key" type="text">
          </div>
        </div>
        <button class="btn-primary" onclick="createUser()">Создать</button>
      </div>

      <div class="card">
        <h2 style="margin-top:0">Пользователи</h2>
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Имя</th>
              <th>Роль</th>
              <th>Ключ</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>

      <div class="card">
        <h2 style="margin-top:0">Роли и права</h2>
        <div id="roles-list"></div>
      </div>
    </div>
  </div>

  <script>
    const API = "/api/v1";
    let apiKey = localStorage.getItem("nickel_api_key") || "";
    let authStatus = {};

    function showMsg(text, type = "info") {
      const el = document.getElementById("message");
      el.className = "alert alert-" + type;
      el.innerHTML = text;
    }

    function headers() {
      return { "Content-Type": "application/json", "X-API-Key": apiKey };
    }

    async function api(path, opts = {}) {
      const res = await fetch(API + path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || data.message || res.statusText);
      return data;
    }

    async function init() {
      try {
        authStatus = await fetch(API + "/auth/status").then(r => r.json());
        if (authStatus.setup_required) {
          const hint = authStatus.admin_from_env
            ? "Admin из AUTH_ADMIN не создан — проверьте формат и перезапустите API."
            : "Задайте <code>AUTH_ADMIN=email|name|api_key</code> в .env и перезапустите API.";
          showMsg(hint, "err");
          return;
        }
        if (!apiKey) {
          document.getElementById("login-panel").classList.remove("hidden");
          if (authStatus.admin_from_env) {
            showMsg(
              "Вход API-ключом из AUTH_ADMIN" +
              (authStatus.env_admin_email ? " (" + authStatus.env_admin_email + ")" : ""),
              "info"
            );
          }
          return;
        }
        await loadAdmin();
      } catch (e) {
        showMsg(e.message, "err");
      }
    }

    async function login() {
      apiKey = document.getElementById("login-key").value.trim();
      if (!apiKey) return showMsg("Введите API-ключ", "err");
      try {
        const me = await api("/auth/me");
        if (me.role !== "admin") throw new Error("Нужна роль admin");
        localStorage.setItem("nickel_api_key", apiKey);
        document.getElementById("login-panel").classList.add("hidden");
        await loadAdmin();
      } catch (e) {
        apiKey = "";
        showMsg("Неверный ключ или недостаточно прав: " + e.message, "err");
      }
    }

    function logout() {
      apiKey = "";
      localStorage.removeItem("nickel_api_key");
      location.reload();
    }

    async function loadAdmin() {
      document.getElementById("admin-panel").classList.remove("hidden");
      const me = await api("/auth/me");
      document.getElementById("current-user").textContent = me.name + " (" + me.email + ") — " + me.role;

      const rolesData = await api("/admin/roles");
      const roleSelect = document.getElementById("new-role");
      roleSelect.innerHTML = rolesData.roles.map(r =>
        `<option value="${r.role}">${r.role}</option>`
      ).join("");

      const rolesList = document.getElementById("roles-list");
      rolesList.innerHTML = rolesData.roles.map(r =>
        `<p><span class="badge">${r.role}</span> ${r.permissions.join(", ")}</p>`
      ).join("");

      await refreshUsers();
    }

    async function refreshUsers() {
      const data = await api("/admin/users");
      const rolesData = await api("/admin/roles");
      const assignable = rolesData.roles.map(r => r.role);
      const envEmail = authStatus.env_admin_email;
      const tbody = document.getElementById("users-body");
      tbody.innerHTML = data.users.map(u => {
        const isEnvAdmin = envEmail && u.email === envEmail;
        const roleOptions = isEnvAdmin
          ? `<span class="badge">admin</span> <span style="color:var(--muted);font-size:0.75rem">(.env)</span>`
          : `<select onchange="changeRole('${u.id}', this.value)">` +
            assignable.map(r => `<option value="${r}" ${r === u.role ? 'selected' : ''}>${r}</option>`).join('') +
            `</select>`;
        const actions = isEnvAdmin
          ? `<span style="color:var(--muted);font-size:0.8rem">ключ из AUTH_ADMIN</span>`
          : `<button class="btn-secondary btn-sm" onclick="rotateKey('${u.id}')">Новый ключ</button>
             <button class="btn-danger btn-sm" onclick="deleteUser('${u.id}', '${u.email}')">Удалить</button>`;
        return `
        <tr>
          <td>${u.email}</td>
          <td>${u.name}</td>
          <td>${roleOptions}</td>
          <td>${u.key_hint || '—'}</td>
          <td class="actions">${actions}</td>
        </tr>`;
      }).join("");
    }

    async function createUser() {
      try {
        const body = {
          email: document.getElementById("new-email").value,
          name: document.getElementById("new-name").value,
          role: document.getElementById("new-role").value,
        };
        const key = document.getElementById("new-key").value.trim();
        if (key) body.api_key = key;
        const res = await api("/admin/users", { method: "POST", body: JSON.stringify(body) });
        showMsg(
          "Пользователь создан. API-ключ:<div class='key-box'>" + res.api_key + "</div>",
          "ok"
        );
        document.getElementById("new-email").value = "";
        document.getElementById("new-name").value = "";
        document.getElementById("new-key").value = "";
        await refreshUsers();
      } catch (e) {
        showMsg(e.message, "err");
      }
    }

    async function changeRole(userId, role) {
      try {
        await api("/admin/users/" + userId, { method: "PATCH", body: JSON.stringify({ role }) });
        showMsg("Роль обновлена", "ok");
      } catch (e) {
        showMsg(e.message, "err");
        await refreshUsers();
      }
    }

    async function rotateKey(userId) {
      if (!confirm("Сгенерировать новый API-ключ? Старый перестанет работать.")) return;
      try {
        const res = await api("/admin/users/" + userId + "/rotate-key", { method: "POST" });
        showMsg("Новый ключ:<div class='key-box'>" + res.api_key + "</div>", "ok");
        await refreshUsers();
      } catch (e) {
        showMsg(e.message, "err");
      }
    }

    async function deleteUser(userId, email) {
      if (!confirm("Удалить пользователя " + email + "?")) return;
      try {
        await api("/admin/users/" + userId, { method: "DELETE" });
        showMsg("Пользователь удалён", "ok");
        await refreshUsers();
      } catch (e) {
        showMsg(e.message, "err");
      }
    }

    init();
  </script>
</body>
</html>
